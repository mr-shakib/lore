version: "3.9"

# Local development stack — mirrors the free-tier services used in production.
# Start everything:   docker compose up -d
# Stop everything:    docker compose down
# View logs:          docker compose logs -f api

services:
  # ── PostgreSQL (mirrors Supabase Free) ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (mirrors Upstash Redis Free) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Kafka (mirrors Upstash Kafka) ─────────────────────────────────────────
  # Using Redpanda — Kafka-compatible, single binary, much easier for local dev
  kafka:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://kafka:9092,external://localhost:19092
      - --mode dev-container
      - --smp 1
      - --memory 512M
    ports:
      - "19092:19092"   # Kafka external (connect from host with localhost:19092)
      - "9092:9092"     # Kafka internal (used by the api service)
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q Healthy"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Lore API ───────────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/lore
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app   # Hot reload in development
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info

volumes:
  postgres_data:
